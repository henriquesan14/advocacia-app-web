<div class="container">
    <app-form-historico hasRole="CADASTRAR_PROCESSO"
     [processoId]="processoId" (submitEvent)="addHistorico($event)"></app-form-historico>
    <h3 class="mt-2">Histórico</h3>
    @for(historico of responsePageHistoricos.items; track $index){
    <app-card-historico (submitEvent)="atualizarHistorico($event)" (deleteEvent)="deleteHistorico(historico.id, $index)"
      [historico]="historico"></app-card-historico>
    }@empty {
    <span>Não há nenhum histórico</span>
    }
   
    <nz-pagination
      class="mt-3"
      [nzPageIndex]="responsePageHistoricos.currentPage"
      [nzTotal]="responsePageHistoricos.totalCount"
      [nzPageSize]="responsePageHistoricos.pageSize"
      [nzShowSizeChanger]="true"
      [nzPageSizeOptions]="[5,10,20]"
      (nzPageIndexChange)="onPageChange($event)"
      (nzPageSizeChange)="onPageSizeChange($event)">
    </nz-pagination>
</div>
